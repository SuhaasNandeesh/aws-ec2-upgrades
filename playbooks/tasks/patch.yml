---
# playbooks/tasks/patch.yml
# The upgrade phase. Runs apt update + apt dist-upgrade non-interactively.
# Sets facts:
#   - upgraded_packages: list[dict] with name, old, new
#   - upgrade_failed: bool
#   - upgrade_error: str (error message if failed)

- name: Record pre-upgrade package versions
  ansible.builtin.shell: dpkg-query -W -f='${Package}\t${Version}\n'
  register: _pre_pkg_raw
  changed_when: false

- name: Build pre-upgrade package version dict
  ansible.builtin.set_fact:
    _pre_pkg_versions: >-
      {%
        set pkgs = {}
      -%}
      {%
        for line in _pre_pkg_raw.stdout_lines
      -%}
        {%
          set parts = line.split('\t')
        -%}
        {%
          if parts | length >= 2
        -%}
          {%
            set _ = pkgs.__setitem__(parts[0], parts[1])
          -%}
        {%
          endif
      -%}
      {%
        endfor
      -%}
      {{ pkgs }}
    upgrade_failed: false
    upgrade_error: ""

- name: Determine upgrade mode and initialize target package list
  ansible.builtin.set_fact:
    upgrade_mode: >-
      {{
        'full'
        if (full_upgrade | default(false) | bool
            or not (inspector_manifest is defined and inspector_manifest | length > 0))
        else 'inspector'
      }}
    upgrade_skipped: false
    upgrade_skip_reason: ""
    target_packages: []
    _effective_full_upgrade: >-
      {{
        true
        if (full_upgrade | default(false) | bool
            or not (inspector_manifest is defined and inspector_manifest | length > 0))
        else false
      }}

- name: Load Inspector manifest (inspector mode only)
  ansible.builtin.set_fact:
    _inspector_manifest: "{{ lookup('file', inspector_manifest) | from_json }}"
  when:
    - not _effective_full_upgrade | bool
    - inspector_manifest is defined and inspector_manifest | length > 0

- name: Extract target packages for this host from manifest
  ansible.builtin.set_fact:
    target_packages: "{{ _inspector_manifest.get(inventory_hostname, []) }}"
  when:
    - not _effective_full_upgrade | bool
    - _inspector_manifest is defined

- name: Mark host as skipped if not in manifest (inspector mode)
  ansible.builtin.set_fact:
    upgrade_skipped: true
    upgrade_skip_reason: >-
      {{
        'No inspector manifest provided; use --inspector-manifest or --full-upgrade'
        if not (inspector_manifest is defined and inspector_manifest | length > 0)
        else 'Host not found in inspector manifest'
      }}
  when:
    - not _effective_full_upgrade | bool
    - target_packages | length == 0

- name: End host if upgrade skipped (not in inspector manifest)
  ansible.builtin.meta: end_host
  when: upgrade_skipped | default(false) | bool

- name: Disable unattended-upgrades to avoid apt lock contention
  ansible.builtin.systemd:
    name: unattended-upgrades
    state: stopped
  failed_when: false

- name: Run upgrade with disk check, apt upgrade, autoremove (block/rescue/always)
  block:
    - name: Check available disk space before upgrade
      ansible.builtin.shell: >
        boot_free=$(df -Pk /boot 2>/dev/null | awk 'NR==2 {print $4}');
        root_free=$(df -Pk / 2>/dev/null | awk 'NR==2 {print $4}');
        if [ -z "$boot_free" ]; then boot_free="$root_free"; fi;
        echo "boot:${boot_free:-0} root:${root_free:-0}"
      register: _disk_check
      changed_when: false
      failed_when: false

    - name: Verify sufficient disk space (boot >= 500MB, root >= 1GB)
      ansible.builtin.assert:
        that:
          - "(_disk_check.stdout | regex_findall('boot:(\\d+)') | first | int) >= 512000"
          - "(_disk_check.stdout | regex_findall('root:(\\d+)') | first | int) >= 1024000"
        fail_msg: >-
          Insufficient disk space for upgrade.
          boot: {{ _disk_check.stdout | regex_findall('boot:(\\d+)') | first | default('0') }}KB free,
          root: {{ _disk_check.stdout | regex_findall('root:(\\d+)') | first | default('0') }}KB free.
          Required: boot >= 500MB, root >= 1GB.

    - name: apt-get update
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        force_apt_get: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: apt-get dist-upgrade (full upgrade fallback, noninteractive)
      ansible.builtin.apt:
        upgrade: dist
        dpkg_options: "force-confold,force-confdef"
        force_apt_get: true
      environment:
        DEBIAN_FRONTEND: noninteractive
        NEEDRESTART_MODE: a
      when: _effective_full_upgrade | bool

    - name: apt-get upgrade targeted packages (Inspector-driven, noninteractive)
      ansible.builtin.apt:
        name: "{{ target_packages }}"
        state: latest
        only_upgrade: true
        dpkg_options: "force-confold,force-confdef"
        force_apt_get: true
      environment:
        DEBIAN_FRONTEND: noninteractive
        NEEDRESTART_MODE: a
      when:
        - not _effective_full_upgrade | bool
        - target_packages is defined and target_packages | length > 0

    - name: Autoremove obsolete packages to free disk space
      ansible.builtin.apt:
        autoremove: true
        purge: true
        force_apt_get: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Read post-upgrade package versions
      ansible.builtin.shell: dpkg-query -W -f='${Package}\t${Version}\n'
      register: _post_pkg_raw
      changed_when: false

    - name: Compute upgraded packages (pre vs post version diff)
      ansible.builtin.set_fact:
        upgraded_packages: >-
          {%
            set post_map = {}
          -%}
          {%
            for line in _post_pkg_raw.stdout_lines
          -%}
            {%
              set parts = line.split('\t')
            -%}
            {%
              if parts | length >= 2
            -%}
              {%
                set _ = post_map.__setitem__(parts[0], parts[1])
              -%}
            {%
              endif
          -%}
          {%
            endfor
          -%}
          {%
            set upgraded = []
          -%}
          {%
            for name, old_ver in _pre_pkg_versions.items()
          -%}
            {%
              set new_ver = post_map.get(name, old_ver)
            -%}
            {%
              if new_ver != old_ver
            -%}
              {%
                set _ = upgraded.append({'name': name, 'old': old_ver, 'new': new_ver})
              -%}
            {%
              endif
          -%}
          {%
            endfor
          -%}
          {{ upgraded | sort(attribute='name') }}

  rescue:
    - name: Mark upgrade as failed
      ansible.builtin.set_fact:
        upgrade_failed: true
        upgrade_error: "{{ ansible_failed_result.msg | default('apt upgrade failed') }}"

    - name: Read post-upgrade package versions (after failure)
      ansible.builtin.shell: dpkg-query -W -f='${Package}\t${Version}\n'
      register: _post_pkg_raw_rescue
      changed_when: false
      failed_when: false

    - name: Compute upgraded packages (partial, if any)
      ansible.builtin.set_fact:
        upgraded_packages: >-
          {%
            set post_map = {}
          -%}
          {%
            for line in _post_pkg_raw_rescue.stdout_lines
          -%}
            {%
              set parts = line.split('\t')
            -%}
            {%
              if parts | length >= 2
            -%}
              {%
                set _ = post_map.__setitem__(parts[0], parts[1])
              -%}
            {%
              endif
          -%}
          {%
            endfor
          -%}
          {%
            set upgraded = []
          -%}
          {%
            for name, old_ver in _pre_pkg_versions.items()
          -%}
            {%
              set new_ver = post_map.get(name, old_ver)
            -%}
            {%
              if new_ver != old_ver
            -%}
              {%
                set _ = upgraded.append({'name': name, 'old': old_ver, 'new': new_ver})
              -%}
            {%
              endif
          -%}
          {%
            endfor
          -%}
          {{ upgraded | sort(attribute='name') }}

  always:
    - name: Re-enable unattended-upgrades
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: started
      failed_when: false